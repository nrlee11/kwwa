<!DOCTYPE html>
<html lang="ko" class="layerOpen">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>자격증 급수 선택 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap" aria-hidden="true">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert">자격증 급수 선택</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 자격증 급수 선택 -->
        <div class="layerFix minPopup" id="alertPop" role="dialog" aria-modal="true" style="display: " tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">자격취득 가능여부 자가진단</strong>
                </div>
                <div class="cont">
                    <!-- [include] 자격명 -->
                    <div data-include-file="./layer/name_badge_license.html" class="includeJs"></div>
                    <!-- //[include] 자격명 -->

                    <!-- 스크롤 -->
                    <div class="layer_scroll">
                        <!-- 타이틀 -->
                        <div class="tit_area">
                            <strong class="tit ico_progress">자격증 급수 선택</strong>
                        </div>
                        <!-- // 타이틀 -->

                        <div class="article">
                            <div class="question_area">
                                <div class="question_box">
                                    <strong class="tit">Q. 귀하는 몇 급을 취득하시길 원하십니까?</strong>
                                </div>
                                <div class="answer_box">
                                    <div class="radio_set">
                                        <span class="inp_radio">
                                            <input type="radio" id="label1" name="label" checked />
                                            <label for="label1">1급</label>
                                        </span>
                                        <span class="inp_radio">
                                            <input type="radio" id="label2" name="label" />
                                            <label for="label2">2급</label>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- //스크롤 -->
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md">다음</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 자격증 급수 선택 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 자격증 급수 선택
                $("#alert").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");
                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
