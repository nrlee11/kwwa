<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_pop">가상계좌번호</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include]  -->
        <div data-include-file=".\layer\540-001-04P.html" class="includeJs"></div>
        <!-- //[include]  -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $this.html(data);
                        // Layer : 	가상계좌번호
                        $(".btn_pop:contains('가상계좌번호')").click(function (e) {
                            $("html").addClass("layerOpen");
                            $("#wrap").attr("aria-hidden", "true");

                            $("#popVirtualAccount").show().focus();
                        });
                        $("#popVirtualAccount .layer_close").click(function (e) {
                            $(".btn_pop:contains('가상계좌번호')").focus(); // 접근성
                        });
                    });
                });
            });
        </script>
    </body>
</html>
