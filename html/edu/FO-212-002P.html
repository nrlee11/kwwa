<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>교과 편성표 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg eduProgram">교과 편성표</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <!-- [include] Layer -->
        <div data-include-file="./layer/212-002P.html" class="includeJs"></div>
        <!--// [include] Layer -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 교과 편성표
                $(".eduProgram").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#eduProgramPop").show().focus();
                });
                $("#eduProgramPop .layer_close").click(function (e) {
                    $(".eduProgram").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
