<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>신청 교육의 정보 동의 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <span class="inp_check">
                        <input type="checkbox" id="agree1" />
                        <label for="agree1"><span class="txt_red">[필수]</span> 신청 교육의 정보 동의</label>
                    </span>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 개인정보 수집 및 이용 동의 -->
        <div class="layerFix fullPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">신청 교육의 정보 동의</strong>
                    </div>
                    <div class="layer_scroll">
                        <div class="article">
                           <p>-고객님께서는 아래 내용에 대하여 동의를 거부하실 수 있으며, 
거부 시 교육 신청이 제한됩니다.
</p>
<div class="box_border" style="margin: var(--gap-20) 0;">
    <p>신청한 교육의 교육명, 교육정보, 가격, 배송정보,
    유의사항을 확인하였으며, 이에 동의합니다.
    </p>
</div>
                            </div>
                        </div>
                    </div>
                    <div class="foot">
                    <div class="btn_area">
                        <div class="lside">
                            <button type="button" class="btn_primary_md layer_close">동의하고 닫기</button>
                        </div>
                        <div class="rside">
                            <button type="button" class="btn_outline_md layer_close">닫기</button>
                        </div>
                    </div>
                </div>
                                
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
                </div>

            </div>
        </div>
        <!--// Layer : 과목별 점수표 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 과목별 점수표
                $("#agree1").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");
                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
