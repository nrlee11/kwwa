<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>취소 요청 확인 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert">취소 요청 확인</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 취소 요청 확인 -->
        <div class="layerFix fullPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">취소 요청 확인</strong>
                    </div>
                    <div class="layer_scroll">
                        <div class="article">
                            <div class="tit">교육의 취소 및 환불</div>
                            <p class="txt">교육신청의 취소 및 교육 중 중도취소 시 환불이 가능하며 이 경우 아래 기준에 따라 환불됩니다.</p>
                        </div>
                        <div class="article">
                            <div data-include-file="./include/board-220-001PG.html" class="includeJs"></div>
                        </div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <div class="lside">
                            <button type="button" class="btn_outline_md">취소요청</button>
                        </div>
                        <div class="rside">
                            <button type="button" class="btn_primary_md layer_close">닫기</button>
                        </div>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 취소 요청 확인 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 취소 요청 확인
                $("#alert").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
