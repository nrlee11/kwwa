<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>환불 정보 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert">환불 정보</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 환불 정보 -->
        <div class="layerFix fullPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">환불 정보</strong>
                    </div>
                    <div class="layer_scroll">
                        <div class="article">
                            <div class="tit">*결제 정보</div>
                            <div class="payment_info">
                                <div class="item">
                                    <div class="item_tit">주문번호:</div>
                                    <div class="item_cont">a4CWyWY5m89PNh7xJwhk1</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">결제번호:</div>
                                    <div class="item_cont">a4CWyWY5m89PNh7xJwhk1</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">상품명:</div>
                                    <div class="item_cont">응시료</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">결제수단:</div>
                                    <div class="item_cont">가상계좌</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">결제금액:</div>
                                    <div class="item_cont">789,000원</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">입금일시:</div>
                                    <div class="item_cont">2025-02-11 00:00:00</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">취소사유:</div>
                                    <div class="item_cont">사용자 취소</div>
                                </div>
                                <div class="item">
                                    <div class="item_tit">취소신청일시:</div>
                                    <div class="item_cont">2025-02-21 00:00:00</div>
                                </div>
                            </div>
                        </div>
                        <div class="article">
                            <div class="tit">*환불 신청 정보</div>
                            <!-- board -->
                            <div class="board_area gap_mt10">
                                <!-- form-->
                                <div class="form_section boxing">
                                    <!-- board_write -->
                                    <div class="form_list size100">
                                        <div class="form_group">
                                            <div class="tit">
                                                <label for="labelName1">
                                                    은행명
                                                    <span class="txt_require"><span class="hidden">필수입력 사항</span></span>
                                                </label>
                                            </div>
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <div class="inp_select size_289">
                                                            <select title="은행 선택" id="labelName1">
                                                                <option value="">은행 선택</option>
                                                                <option value="">신한은행</option>
                                                                <option value="">우리은행</option>
                                                                <option value="">하나은행</option>
                                                                <option value="">경남은행</option>
                                                                <option value="">광주은행</option>
                                                                <option value="">KB국민은행</option>
                                                                <option value="">IBK기업은행</option>
                                                                <option value="">NH농협은행</option>
                                                                <option value="">Sh수협은행</option>
                                                                <option value="">새마을금고</option>
                                                                <option value="">우체국예금보험</option>
                                                                <option value="">iM뱅크(대구)</option>
                                                                <option value="">부산은행</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form_group">
                                            <div class="tit">
                                                <label for="labelName2">
                                                    계좌번호
                                                    <span class="txt_require"><span class="hidden">필수입력 사항</span></span>
                                                </label>
                                            </div>
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <div class="inp size_289">
                                                            <input type="tel" value="12345678912345678912" id="labelName2" autocomplete="off" />
                                                        </div>
                                                    </div>
                                                    <p class="msg_txt">- 없이 숫자만 입력 해 주세요(20자)</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form_group">
                                            <div class="tit">
                                                <label for="labelName3">
                                                    예금주
                                                    <span class="txt_require"><span class="hidden">필수입력 사항</span></span>
                                                </label>
                                            </div>
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <div class="inp size_289">
                                                            <input type="text" id="labelName3" autocomplete="off" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form_group">
                                            <div class="tit">
                                                <label for="labelName4">
                                                    휴대폰 번호
                                                    <span class="txt_require"><span class="hidden">필수입력 사항</span></span>
                                                </label>
                                            </div>
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <div class="inp size_289">
                                                            <input type="tel" id="labelName4" autocomplete="off" />
                                                        </div>
                                                    </div>
                                                    <p class="msg_txt">- 없이 숫자만 입력 해 주세요(11자)</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!--// board_write -->
                                </div>
                                <!--// form-->
                            </div>
                            <!--// board -->
                        </div>
                        <div class="article">
                            <p class="txt_note">취소, 환불요청이 처리 되었습니다.<br />카드사의 사정에 따라 7~11일 소요 될 수 있습니다.</p>
                        </div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 환불 정보 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 환불 정보
                $("#alert").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
