<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>반품 주소 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert">반품 주소</button>
                </div>
            </div>

            <!-- Layer : 반품 주소 -->
            <div class="layerFix alertPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
                <div class="layer_wrap">
                    <div class="head">
                        <strong class="tit">상하수도 국가전문자격시스템</strong>
                    </div>
                    <div class="cont">
                        <div class="tit_area">
                            <strong class="tit">반품 주소</strong>
                        </div>
                        <div class="article">
                            <div class="tit">보내실 곳 :</div>
                            (07379) 서울특별시 영등포구 대림로 244(대림동)<br />
                            한국상하수도협회<br />
                            상수도관망시설운영관리사 담당자 앞<br />
                            <span class="tit">문의:</span> <a href="tel:02-3156-7881">02-3156-7881</a>
                        </div>
                    </div>
                    <div class="foot">
                        <div class="btn_area">
                            <div class="lside">
                                <button type="button" class="btn_outline_md">복사하기<span class="ico_copy"></span></button>
                            </div>
                            <div class="rside">
                                <button type="button" class="btn_primary_md layer_close">확인</button>
                            </div>
                        </div>
                    </div>
                    <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
                </div>
            </div>
            <!--// Layer : 반품 주소 -->
        </div>
        <!--// wrap(e) -->
        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 반품 주소
                $("#alert").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
