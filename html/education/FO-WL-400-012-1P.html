<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>서류제출 | 실무교육 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert3">실무교육 확인 제출 완료</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 실무교육 확인 제출 완료 -->
        <div class="layerFix alertPopup" id="alertPop3" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="alert_msg">
                        <div class="msg completion">정상적으로 제출 되었습니다.</div>
                        <div class="txt">
                            <a href="javascript:;" class="btn_txtlink">실무교육확인 조회</a>에서 진행상태 확인 가능합니다.<br />
                            <p class="txt_mark">제출된 서류는 자격증 신청 시 원본을 등기우편을 통해 제출하여야 합니다.</p>
                        </div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 실무교육 확인 제출 완료 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 실무교육 확인 제출 완료
                $("#alert3").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop3").show().focus();
                });
                $("#alertPop3 .layer_close").click(function (e) {
                    $("#alert3").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
