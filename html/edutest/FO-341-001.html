<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>합격조회 | 평가시험 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="../include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- [include] aside(s) : 확인용 -->
                    <div data-include-file="../include/aside2.html" class="includeJs"></div>
                    <!--// [include] aside(e) : 확인용 -->

                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- breadcrumb(s) -->
                        <nav class="breadcrumb_wrap">
                            <ol class="breadcrumb">
                                <li><a href="javascript:;">홈</a></li>
                                <li><a href="javascript:;">평가시험</a></li>
                                <li><span>합격조회</span></li>
                            </ol>
                        </nav>
                        <!--// breadcrumb(e) -->

                        <!-- page_title(s) -->
                        <div class="page_title">
                            <h2 class="tit">합격조회</h2>
                        </div>
                        <!--// page_title(e) -->

                        <!-- section(s) -->
                        <div class="section">
                            <div class="tit_area">
                                <h3 class="tit">합격조회</h3>
                                <div class="desc">응시하신 평가시험의 결과는 아래와 같습니다.</div>
                            </div>

                            <!-- 결과 - 없음 -->
                            <div class="result_area base">
                                조회 가능한 평가시험이 없습니다.<br />
                                평가시험 일정 또는 응시 여부를 확인하여 주시기 바랍니다.
                            </div>
                            <!-- // 결과 - 없음 -->
                        </div>
                        <!--// section(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="../include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side2.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $this.html(data);
                        // 현재 페이지 - 메뉴 활성화
                        $(".lnb a[href*='FO-341-001.html']").attr("aria-current", "page").parents("li").addClass("on");

                        // Layer : 과목별 점수표
                        $(".btn_pop:contains('과목별 점수 확인하기')").click(function (e) {
                            $("html").addClass("layerOpen");
                            $("#wrap").attr("aria-hidden", "true");
                            $("#popGradeConfirm").show().focus();
                        });
                        $("#popGradeConfirm .layer_close").click(function (e) {
                            $(".btn_pop:contains('과목별 점수 확인하기'").focus(); // 접근성
                        });
                    });
                });
            });
        </script>
    </body>
</html>
