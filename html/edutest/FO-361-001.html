<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>합격증발급 | 평가시험 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="../include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- [include] aside(s) : 확인용 -->
                    <div data-include-file="../include/aside2.html" class="includeJs"></div>
                    <!--// [include] aside(e) : 확인용 -->

                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- breadcrumb(s) -->
                        <nav class="breadcrumb_wrap">
                            <ol class="breadcrumb">
                                <li><a href="javascript:;">홈</a></li>
                                <li><a href="javascript:;">평가시험</a></li>
                                <li><span>의견제출</span></li>
                            </ol>
                        </nav>
                        <!--// breadcrumb(e) -->

                        <!-- page_title(s) -->
                        <div class="page_title">
                            <h2 class="tit">합격증 발급</h2>
                        </div>
                        <!--// page_title(e) -->

                        <!-- section(s) -->
                        <div class="section">
                            <div class="tit_area">
                                <h3 class="tit">합격증 발급</h3>
                            </div>

                            <p class="txt">귀하의 자격취득 내역이 존재하지 않습니다. <br />이 페이지에서는 직전 시험에 대해서만 이 가능합니다. <br />이전에 시험을 응시하셨다면 마이페이지 메뉴에서 확인해 주시기 바랍니다.</p>
                        </div>
                        <!--// section(e) -->

                        <!-- section(s) -->
                        <div class="section">
                            <div class="tit_area">
                                <h3 class="tit">주의사항</h3>
                            </div>

                            <p class="txt">-확인증은 1,2차 시험의 합격여부를 확인하는 문서이며, 자격을 취득한 것을 의미하지 않습니다. <br />-자격의 취득여부는 실제 발급된 자격증을 통해서만 확인할 수 있습니다. <br />-필요시 확인증의 진위여부를 QR코드를 통해 확인할 수 있습니다.</p>
                        </div>
                        <!--// section(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="../include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side2.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $this.html(data);
                        // 현재 페이지 - 메뉴 활성화
                        $(".lnb a[href*='FO-350-001.html']").attr("aria-current", "page").parents("li").addClass("on");
                    });
                });

                // 파일첨부 샘플
                $("#fileMulti001").on("change", function (e) {
                    const files = this.files;

                    Array.from(files).forEach((file) => {
                        $(this).next(".add_file_box").append(`<button type="button" class="btn_file_delete">${file.name}<span class="hidden">삭제</span></button>`);
                    });
                });
                $(".add_file_box").on("click", ".btn_file_delete", function () {
                    $(this).remove();
                });
            });
        </script>
    </body>
</html>
