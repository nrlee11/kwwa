<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>본인인증 | 회원 가입 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="../include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- page_title -->
                        <div class="page_title center">
                            <h2 class="tit">회원 가입</h2>
                        </div>
                        <!--// page_title -->

                        <!-- progress -->
                        <div class="progress-bar">
                            <!-- 2025-04-04 수정 -->
                            <div class="completion">
                                <span class="step">
                                    <span>1단계</span>
                                </span>
                                <strong class="long">이용약관 동의</strong>
                            </div>
                            <div class="on">
                                <span class="step">
                                    <span>2단계</span>
                                </span>
                                <strong>본인 인증</strong>
                                <span class="hidden">총 4단계 중 2단계 본인인증</span>
                            </div>
                            <div>
                                <span class="step">
                                    <span>3단계</span>
                                </span>
                                <strong>정보 입력</strong>
                            </div>
                            <div>
                                <span class="step">
                                    <span>4단계</span>
                                </span>
                                <strong>가입 완료</strong>
                            </div>
                            <!--// 2025-04-04 수정 -->
                        </div>
                        <!--// progress -->

                        <!-- join_wrap(s) -->
                        <div class="join_wrap fix_cont">
                            <!-- section(s) -->
                            <div class="section">
                                <!-- [include] 본인인증 -->
                                <div data-include-file="../include/components/identity.html" class="includeJs"></div>
                                <!--// [include] 본인인증 -->
                            </div>
                            <!--// section(e) -->

                            <!-- section(s) -->
                            <div class="section">
                                <div class="notice_box">
                                    <p class="ico_txt"><span class="ico_mark" aria-hidden="true"></span> 주의사항 : 회원가입 시 본인 인증은 본인명의 핸드폰만 가능 합니다.</p>
                                </div>
                            </div>
                            <!--// section(e) -->

                            <!-- btn -->
                            <div class="bottom_btn_area">
                                <div class="lside">
                                    <button type="button" class="btn_outline_lg">이전</button>
                                </div>
                                <div class="rside">
                                    <button type="button" class="btn_primary_lg">다음</button>
                                </div>
                            </div>
                            <!--// btn -->
                        </div>
                        <!--// join_wrap(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="../include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
    </body>
</html>
