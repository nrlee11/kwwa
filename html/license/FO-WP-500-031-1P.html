<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>기본증명서 안내 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="basicguide">기본증명서 안내</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 기본증명서 안내 -->
        <div class="layerFix fullPopup" id="basicguidePop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">기본증명서 안내</strong>
                    </div>
                    <div class="article">
                        <div class="tit">발급내용</div>
                        <ul class="list_dash">
                            <li>신청인 본인확인을 위한 기본증명서로 <strong class="txt_underline">주민등록번호 13자리 모두 표시</strong>하여 제출</li>
                            <li><strong class="txt_underline">유형(일반, 상세)과 상관없이 모두 제출이 가능</strong>합니다. 다만, 제출 서류상의 이름이 서로 달라 <strong class="txt_underline">개명사실 확인이 필요한 경우 '상세'유형으로 제출</strong>해야 합니다.</li>
                        </ul>
                    </div>
                    <div class="article">
                        <div class="tit">발급방법</div>
                        <ul class="list_dash">
                            <li>(방문발급) 주민센터</li>
                            <li>
                                (인터넷 발급) 대한민국 법원
                                <a href="https://efamily.scourt.go.kr" class="txt_bold"><span class="txt_underline">전자가족관계등록시스템</span></a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 기본증명서 안내 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 기본증명서 안내
                $("#basicguide").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#basicguidePop").show().focus();
                });
                $("#basicguidePop .layer_close").click(function (e) {
                    $("#basicguide").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
