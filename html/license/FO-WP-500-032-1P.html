<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>자격증 발급신청 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert1">작성 완료</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 작성 완료 -->
        <div class="layerFix alertPopup" id="alertPop1" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="article">
                        <!-- progress(s) -->
                        <div class="progress-bar">
                            <div class="completion">
                                <span class="step">
                                    <span>1단계</span>
                                </span>
                                <strong><a href="javascript:;">신청서 작성</a></strong>
                            </div>
                            <div class="on">
                                <span class="step">
                                    <span>2단계</span>
                                </span>
                                <strong><a href="javascript:;">신청정보확인</a></strong>
                                <span class="hidden">총 3단계 중 2단계 신청정보확인</span>
                            </div>
                            <div>
                                <span class="step">
                                    <span>3단계</span>
                                </span>
                                <strong><a href="javascript:;">수수료 결제</a></strong>
                            </div>
                        </div>
                        <!--// progress(e) -->
                        <div class="align_center gap_mt30">
                            신청서 작성을 완료 하시겠습니까?<br />
                            완료 후 수정이 불가하니 신중하게 검토 하시기 바랍니다.
                        </div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <div class="lside">
                            <button type="button" class="btn_primary_md">작성완료</button>
                        </div>
                        <div class="rside">
                            <button type="button" class="btn_outline_md layer_close">닫기</button>
                        </div>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 작성 완료 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 작성 완료
                $("#alert1").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop1").show().focus();
                });
                $("#alertPop1 .layer_close").click(function (e) {
                    $("#alert1").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
