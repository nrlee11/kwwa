<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="cellPhoneValidation">인증완료</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- 20250428 수정 : 위치이동 및 속성 추가 -->
        <!-- Layer : 인증완료 -->
        <div class="layerFix alertPopup" id="cellPhoneValidationPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="alert_msg">
                        <!-- 2025-04-04 수정 : completion 추가 -->
                        <div class="msg completion">인증이 완료되었습니다.</div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 인증완료 -->
        <!--// 20250428 수정 : 위치이동 및 속성 추가 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 인증완료
                $("#cellPhoneValidation").click(function (e) {
                    $("html").addClass("layerOpen"); // 20250428 추가
                    $("#wrap").attr("aria-hidden", "true"); // 20250428 추가

                    $("#cellPhoneValidationPop").show().focus();
                });
                $("#cellPhoneValidationPop .layer_close").click(function (e) {
                    $("#cellPhoneValidation").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
