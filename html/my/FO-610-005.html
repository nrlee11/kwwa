        <script>
            $(function () {
                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $this.html(data);
                        // 현재 페이지 - 메뉴 활성화
                        $(".lnb a[href*='my/FO-610-005.html']").attr("aria-current", "page").parents("li").addClass("on");
                        $("a[href*='my/FO-610-005.html']").closest(".depth2").show();
                        $("a[aria-controls='site-select-my1'").attr("aria-expanded", "true");

                        // Layer - 만족도 조사
                        $("#btnSurvayStart").click(function (e) {
                            $("html").addClass("layerOpen");
                            $("#wrap").attr("aria-hidden", "true");

                            $("#popSurvayStart").show().focus();
                        });
                        $("#popSurvayStart .btn_primary_md").click(function (e) {
                            $("#popSurvayIng").show().focus();
                        });
                        $("#popSurvayIng .btn_outline_md").click(function (e) {
                            $("#popSurvayStart").show().focus();
                        });
                        $("#popSurvayIng .btn_primary_md").click(function (e) {
                            $("#popSurvayEnd").show().focus();
                        });
                        $("#popSurvayEnd .btn_outline_md").click(function (e) {
                            $("#popSurvayIng").show().focus();
                        });
                    });
                });
            });
