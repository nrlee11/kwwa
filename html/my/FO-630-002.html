<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>문의현황 | 마이페이지 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="../include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- [include] aside(s) : 확인용 -->
                    <div data-include-file="../include/aside.html" class="includeJs"></div>
                    <!--// [include] aside(e) : 확인용 -->

                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- breadcrumb(s) -->
                        <nav class="breadcrumb_wrap">
                            <ol class="breadcrumb">
                                <li><a href="javascript:;">홈</a></li>
                                <li><a href="javascript:;">마이페이지</a></li>
                                <li><span>문의현황</span></li>
                            </ol>
                        </nav>
                        <!--// breadcrumb(e) -->

                        <!-- page_title(s) -->
                        <div class="page_title">
                            <h2 class="tit">문의 내역</h2>
                        </div>
                        <!--// page_title(e) -->

                        <!-- section(s) -->
                        <div class="section">
                            <!-- board -->
                            <div class="board_area">
                                <!-- board_view : 문의 -->
                                <div class="board_view type1">
                                    <div class="head">
                                        <div class="tit_sec">
                                            <span class="data_badge1">문의</span>
                                            <div class="tit">[문의유형] 교육 일정 질문드립니다.</div>
                                        </div>
                                        <div class="desc_sec">
                                            <span class="date">2025-01-08 12:30</span>
                                        </div>
                                    </div>
                                    <div class="cont">
                                        <div class="add_file" style="display: flex; gap: 1rem">
                                            <strong style="white-space: nowrap; font-size: var(--font-size-sm)">첨부파일</strong>
                                            <div class="b_box">
                                                <button type="button" class="btn_download">첨부파일1</button>
                                                <button type="button" class="btn_download">첨부파일2</button>
                                                <button type="button" class="btn_download">첨부파일3</button>
                                            </div>
                                        </div>
                                        신청 시 에러가 발생하여 문의 드립니다.<br />
                                        화면 캡쳐본 첨부합니다.<br />
                                        .<br />
                                        .<br />
                                        .<br />
                                        감사합니다 :)
                                    </div>
                                </div>
                                <!--// board_view : 문의 -->

                                <!-- board_view : 답변 -->
                                <div class="board_view type1 answer">
                                    <div class="head">
                                        <div class="tit_sec">
                                            <span class="data_badge2">답변</span>
                                            <span class="tit">[관리자]</span>
                                        </div>
                                        <div class="desc_sec">
                                            <span class="date">2025-01-08 12:30</span>
                                        </div>
                                    </div>
                                    <div class="cont">
                                        <div class="add_file" style="display: flex; gap: 1rem">
                                            <strong style="white-space: nowrap; font-size: var(--font-size-sm)">첨부파일</strong>
                                            <div class="b_box">
                                                <button type="button" class="btn_download">첨부파일1</button>
                                                <button type="button" class="btn_download">첨부파일2</button>
                                                <button type="button" class="btn_download">첨부파일3</button>
                                            </div>
                                        </div>
                                        테스트 가이드 전달해드립니다.<br />
                                        자세한 사항은 첨부파일 참조부탁드립니다.<br />
                                    </div>
                                </div>
                                <!--// board_view : 답변 -->
                            </div>
                            <!--// board -->
                        </div>
                        <!--// section(e) -->

                        <!-- BUTTON -->
                        <!-- BUTTON: 답변작성 전 -->
                        <div class="bottom_btn_area center">
                            <div class="lside">
                                <button type="button" class="btn_primary_lg">수정</button>
                            </div>
                            <div class="rside">
                                <button type="button" class="btn_outline_lg">삭제</button>
                            </div>
                        </div>
                        <!-- // BUTTON: 답변작성 전 -->

                        <!-- BUTTON: 답변작성 후 -->
                        <div class="bottom_btn_area center">
                            <button type="button" class="btn_primary_lg">목록</button>
                        </div>
                        <!-- // BUTTON: 답변작성 후 -->
                        <!-- // BUTTON -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="../include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
    </body>
</html>
