<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>문의현황 | 마이페이지 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="../include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- [include] aside(s) : 확인용 -->
                    <div data-include-file="../include/aside.html" class="includeJs"></div>
                    <!--// [include] aside(e) : 확인용 -->

                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- breadcrumb(s) -->
                        <nav class="breadcrumb_wrap">
                            <ol class="breadcrumb">
                                <li><a href="javascript:;">홈</a></li>
                                <li><a href="javascript:;">마이페이지</a></li>
                                <li><span>문의현황</span></li>
                            </ol>
                        </nav>
                        <!--// breadcrumb(e) -->

                        <!-- page_title(s) -->
                        <div class="page_title">
                            <h2 class="tit">문의하기</h2>
                        </div>
                        <!--// page_title(e) -->

                        <!-- section(s) -->
                        <div class="section">
                            <!-- board -->
                            <div class="board_area">
                                <!-- form-->
                                <div class="form_section">
                                    <div class="board_addfile_set">
                                        <!-- board_write -->
                                        <div class="form_list base">
                                            <div class="form_group">
                                                <div class="item">
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="group_box">
                                                                <div class="box">
                                                                    <span class="data_badge1">문의</span>
                                                                </div>
                                                                <div class="box">
                                                                    <div class="inp_select size_190">
                                                                        <select title="카테고리 선택">
                                                                            <option value="">카테고리</option>
                                                                            <option value="">교육</option>
                                                                            <option value="">평가시험</option>
                                                                            <option value="">실무교육</option>
                                                                            <option value="">자격증</option>
                                                                            <option value="">결제</option>
                                                                            <option value="">기타</option>
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                                <div class="box">
                                                                    <div class="inp size_360">
                                                                        <input type="text" placeholder="제목을 입력하세요" autocomplete="off" />
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="form_group">
                                                <div class="item">
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="inp_textarea">
                                                                <textarea placeholder="내용을 입력하세요" style="height: 144px"></textarea>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--// board_write -->

                                        <!-- board_write -->
                                        <div class="form_list table">
                                            <div class="form_group">
                                                <div class="tit"><span>파일 첨부</span></div>
                                                <div class="item">
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="file_set">
                                                                <div class="inp">
                                                                    <input type="text" placeholder="파일을 선택하세요" readonly />
                                                                    <!-- <button type="button" class="btn_reset"><span class="hidden">입력 내용 지우기</span></button> -->
                                                                </div>
                                                                <label for="file1">파일찾기</label>
                                                                <input type="file" id="file1" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--// board_write -->
                                        <!-- 파일첨부 목록 -->
                                        <div class="list_addfile"></div>
                                        <!--// 파일첨부 목록 -->
                                    </div>
                                </div>
                                <!--// form-->
                            </div>
                            <!--// board -->
                        </div>
                        <!--// section(e) -->

                        <div class="bottom_btn_area center">
                            <div class="lside">
                                <button type="button" class="btn_outline_lg">초기화</button>
                            </div>
                            <div class="rside">
                                <button type="button" class="btn_primary_lg" id="alert">저장</button>
                            </div>
                        </div>
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="../include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <!-- Layer : 완료 -->
        <div class="layerFix alertPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="alert_msg">
                        <div class="msg completion">저장되었습니다.</div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 완료 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script>
            // 첨부파일 샘플
            $("#file1").on("change", function () {
                var fileName = $(this).val().split("/").pop().split("\\").pop(); // 파일명 추출
                var addHtml = "<span class='addfile'>" + fileName + "<button type='button' class='btn_reset'><span class='hidden'>입력 내용 지우기</span></button></span>";
                $(".list_addfile").append(addHtml);
            });
            $(".list_addfile").on("click", ".btn_reset", function () {
                $(this).closest(".addfile").remove();
            });

            // Layer : 완료
            $("#alert").click(function (e) {
                $("html").addClass("layerOpen");
                $("#wrap").attr("aria-hidden", "true");

                $("#alertPop").show().focus();
            });
            $("#alertPop .layer_close").click(function (e) {
                $("#alert").focus(); // 접근성
            });
        </script>
    </body>
</html>
