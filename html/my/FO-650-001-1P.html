<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>비밀번호 입력 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert">비밀번호 입력</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 비밀번호 입력 -->
        <div class="layerFix alertPopup" id="alertPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">비밀번호 입력</strong>
                    </div>
                    <div class="article">
                        <!-- board -->
                        <div class="board_area">
                            <!-- form-->
                            <div class="form_section">
                                <div class="form_tit">
                                    <div class="msg star">보안확인을 위하여 비밀번호를 입력해 주세요.</div>
                                </div>

                                <!-- board_write -->
                                <div class="form_list base">
                                    <div class="form_group">
                                        <div class="item">
                                            <div class="cell">
                                                <div class="form_item">
                                                    <div class="inp">
                                                        <input type="password" value="" id="userPw" placeholder="비밀번호를 입력하세요" />
                                                        <span class="toggle-password" onclick="togglePassword()">
                                                            <img src="/resources/images/icon/ico_eye_closed.svg" alt="비밀번호 보기" id="eye-icon" />
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!--// board_write -->
                            </div>
                            <!--// form-->
                        </div>
                        <!--// board -->
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 비밀번호 입력 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 비밀번호 입력
                $("#alert").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop").show().focus();
                });
                $("#alertPop .layer_close").click(function (e) {
                    $("#alert").focus(); // 접근성
                });
            });
            function togglePassword() {
                const passwordInput = document.getElementById("userPw");
                const eyeIcon = document.getElementById("eye-icon");

                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    eyeIcon.src = "/resources/images/icon/ico_eye.svg"; // 뜬 눈 아이콘 이미지로 변경
                } else {
                    passwordInput.type = "password";
                    eyeIcon.src = "/resources/images/icon/ico_eye_closed.svg"; // 원래 눈 아이콘 이미지로 복원
                }
            }
        </script>
    </body>
</html>
