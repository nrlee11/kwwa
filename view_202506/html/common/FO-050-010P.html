<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>자격요건 확인 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div style="text-align: center">
                    <button type="button" class="btn_primary_lg" id="requirements04">상수도관망시설운영관리사 자격요건(1급/2급)</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include] 자격요건 -->
        <div data-include-file="/view_202506/html/common/layer/050-010P.html" class="includeJs"></div>
        <!--// [include] 자격요건 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $this.html(data);
                        // Layer : 상수도관망시설운영관리사 자격요건(1급)
                        $("#requirements04").click(function (e) {
                            $("html").addClass("layerOpen");
                            $("#wrap").attr("aria-hidden", "true");

                            $("#requirementsPop04").show().focus();
                        });
                        $("#requirementsPop04 .layer_close").click(function (e) {
                            $("#requirements04").focus(); // 접근성
                        });
                    });
                });
            });
        </script>
    </body>
</html>
