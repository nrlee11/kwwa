<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>알림신청/해체 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px">
                <button type="button" class="btn_border_md radius" id="switchAlarm3">알림받기 (카톡/메일)<span class="ico_bluearrow2"></span></button>

                <button type="button" class="btn_primary_lg" id="switchAlarm1">알림신청 완료</button>

                <button type="button" class="btn_primary_lg" id="switchAlarm2">알림신청 해제</button>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/view_202506/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <!-- [include] Layer -->
        <div data-include-file="./layer/230-001-1P.html" class="includeJs"></div>
        <!--// [include] Layer -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 알림신청
                $("#switchAlarm1").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#switchAlarmPop1").show().focus();
                });
                $("#switchAlarmPop1 .layer_close").click(function (e) {
                    $("#switchAlarm1").focus(); // 접근성
                });

                // Layer : 알림신청 해제
                $("#switchAlarm2").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#switchAlarmPop2").show().focus();
                });
                $("#switchAlarmPop2 .layer_close").click(function (e) {
                    $("#switchAlarm2").focus(); // 접근성
                });

                // Layer : 알림신청 (카톡/메일)
                $("#switchAlarm3").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#switchAlarmPop3").show().focus();
                });
                $("#switchAlarmPop3 .btn_outline_md").click(function (e) {
                    $("#switchAlarm3").focus(); // 접근성
                });

                $("[data-include-file]").each(function () {
                    const $this = $(this);
                    const file = $this.data("include-file");

                    $.get(file, function (data) {
                        $("#switchAlarmPop3 .btn_primary_md").click(function (e) {
                            $("#switchAlarmPop1").show().focus();
                        });
                    });
                });
            });
        </script>
    </body>
</html>
