<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />

        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />

        <title>취소하기 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="alert1">취소하기</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include] Layer -->
        <div data-include-file="./layer/230-004-1P.html" class="includeJs"></div>
        <!--// [include] Layer -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 취소하기
                $("#alert1").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#alertPop1").show().focus();
                });
                $("#alertPop1 .layer_close").click(function (e) {
                    $("#alert1").focus(); // 접근성
                });
            });
        </script>
    </body>
