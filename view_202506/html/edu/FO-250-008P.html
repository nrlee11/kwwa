        <script src="//play.acs.wecandeo.com/html/utils/iframeAPI.js"></script>
        <script>

            document.getElementById("btnSaveAndClose").addEventListener("click", function () {
            location.href = "/view_202506/html/edu/FO-250-002P.html";
            });

            let currentIndex = 0;
            let maxPlayedTime = 0;
            let iframeAPI = null;
            function changeFrameSrc(videoKey, index) {
                const playerUrl = "https://waterpro.v4.wecandeo.com/play/video/v?key=" + videoKey;
                document.getElementById("videoFrame").src = playerUrl;
                document.getElementById("videoFrame").onload = function () {
                    const iframe = document.getElementById("videoFrame");
                    const contents = iframe.contentWindow || iframe.contentDocument;
                    iframeAPI = new smIframeAPI(contents);

                    iframeAPI.onEvent(smIframeEvent.READY, function () {
                        iframeAPI.seekEnable(true); // 시크 허용

                        iframeAPI.onEvent(smIframeEvent.SEEK, function (data) {
                            // SEEK : 사용자가 이동할 경우 발생
                            const seekedTo = data.time;
                            const isUserSeek = data.seeking;

                            if (isUserSeek && seekedTo > maxPlayedTime) {
                                iframeAPI.pause();
                                setTimeout(function () {
                                    showUnifiedAlert("진도 제한", "아직 시청하지 않은 구간으로 이동할 수 없습니다.");
                                }, 0);

                                iframeAPI.setPosition(maxPlayedTime);
                            }
                        });

                        iframeAPI.onEvent(smIframeEvent.TIME, function (data) {
                            const currentTime = data.position; //현재 재생중인 위치

                            //최대 본 시간 업데이트
                            if (currentTime > maxPlayedTime) {
                                //매 시점마다 현재 재생시간을 받아서, 지금까지 가장 멀리본 시간과 비교해서
                                maxPlayedTime = currentTime;
                            }
                        });
                    });
                };

                currentIndex = index;
                maxPlayedTime = 0;
            }

            changeFrameSrc("BzX9iitJP4s1fgPzG6Hu3R0bhXxJzCjo6UBmMLo4gLqUie", 0);

            $(".btn_avi").each(function (idx) {
                $(this).on("click", function () {
                    changeFrameSrc("BzX9iitJP4s1fgPzG6Hu3R0bhXxJzCjo6UBmMLo4gLqUie", idx);
                });
            });

            function showUnifiedAlert(codeMessage, detailMessage, confirmCallback = null) {
                $("#alertPopupCodeMessage").text(codeMessage || "알림");
                $("#alertPopupDetailMessage").text(detailMessage || "");

                $("#alertPopUnified").show().focus();

                $("#alertPopupConfirmBtn")
                    .off("click")
                    .on("click", function () {
                        $("#alertPopUnified").hide();
                        if (typeof confirmCallback === "function") {
                            confirmCallback();
                        }
                    });

                // 취소 버튼 숨김
                $("#alertPopupCancelWrap").hide();
            }
        </script>
