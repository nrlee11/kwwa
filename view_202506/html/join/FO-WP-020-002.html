<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>이용약관 동의 | 회원 가입 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- page_title -->
                        <div class="page_title center">
                            <h2 class="tit">회원 가입</h2>
                        </div>
                        <!--// page_title -->

                        <!-- progress -->
                        <div class="progress-bar">
                            <!-- 2025-04-04 수정 -->
                            <div class="on">
                                <span class="step">
                                    <span>1단계</span>
                                </span>
                                <strong>이용약관 동의</strong>
                                <span class="hidden">총 4단계 중 1단계 이용약관 동의</span>
                            </div>
                            <div>
                                <span class="step">
                                    <span>2단계</span>
                                </span>
                                <strong>본인인증</strong>
                            </div>
                            <div>
                                <span class="step">
                                    <span>3단계</span>
                                </span>
                                <strong>정보 입력</strong>
                            </div>
                            <div>
                                <span class="step">
                                    <span>4단계</span>
                                </span>
                                <strong>가입완료</strong>
                            </div>
                            <!--// 2025-04-04 수정 -->
                        </div>
                        <!--// progress -->

                        <!-- join_wrap(s) -->
                        <div class="join_wrap fix_cont">
                            <!-- section(s) -->
                            <div class="section">
                                <!-- 약관동의-->
                                <div class="terms_area">
                                    <div class="terms_check_all">
                                        <span class="inp_check">
                                            <!-- (공통)접근성 : id값 변경 시 label for값도 동일하게 변경 -->
                                            <input type="checkbox" id="agreeAll" />
                                            <label for="agreeAll">한국상하수도협회 상하수도 국가전문자격시스템 전체 약관에 동의합니다.</label>
                                        </span>
                                    </div>
                                    <ul class="terms_list">
                                        <li>
                                            <div class="terms_item">
                                                <span class="inp_check">
                                                    <input type="checkbox" id="agree1" />
                                                    <label for="agree1"><span class="txt_red">[필수]</span> 서비스 이용약관</label>
                                                </span>
                                                <button type="button" class="btn_more" id="policyService"><span class="hidden">약관보기</span></button>
                                            </div>
                                        </li>
                                        <li>
                                            <div class="terms_item">
                                                <span class="inp_check">
                                                    <input type="checkbox" id="agree2" />
                                                    <label for="agree2"><span class="txt_red">[필수]</span> 개인정보처리방침</label>
                                                </span>
                                                <!-- 2025-04-02 수정 : id값 변경 -->
                                                <button type="button" class="btn_more" id="policyPrivacy"><span class="hidden">약관보기</span></button>
                                            </div>
                                        </li>
                                    </ul>
                                </div>
                                <!--// 약관동의 -->

                                <div class="notice_box">
                                    <p class="ico_txt"><span class="ico_mark" aria-hidden="true"></span>주의사항 : 회원가입 시 본인 인증은 본인명의 핸드폰만 가능 합니다.</p>
                                </div>

                                <!-- btn -->
                                <div class="bottom_btn_area">
                                    <button type="button" class="btn_primary_lg">다음</button>
                                </div>
                                <!--// btn -->
                            </div>
                            <!--// section(e) -->
                        </div>
                        <!--// join_wrap(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/view_202506/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <!-- 20250428 수정 : 위치이동 및 속성 추가 -->
        <!-- Layer : 서비스 이용약관 -->
        <div class="layerFix fullPopup" id="policyServicePop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <a href="../join/FO-WP-020-003P.html" style="display: block; text-align: center">서비스 이용약관(FO-WP-020-003P)</a>
            </div>
        </div>
        <!--// Layer : 서비스 이용약관 -->

        <!-- Layer : 개인정보처리방침 -->
        <div class="layerFix fullPopup" id="policyPrivacyPop" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <a href="../join/FO-WP-020-004P.html" style="display: block; text-align: center">개인정보처리방침(FO-WP-020-004P)</a>
            </div>
        </div>
        <!--// Layer : 개인정보처리방침 -->
        <!--// 20250428 수정 : 위치이동 및 속성 추가 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 서비스 이용약관
                $("#policyService").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true"); // 20250428 추가

                    $("#policyServicePop").show().focus();
                });
                $("#policyServicePop .layer_close").click(function (e) {
                    $("#policyService").focus(); // 접근성
                });

                // Layer : 개인정보처리방침
                $("#policyPrivacy").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true"); // 20250428 추가

                    $("#policyPrivacyPop").show().focus();
                });
                $("#policyPrivacyPop .layer_close").click(function (e) {
                    $("#policyPrivacy").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
