        <div id="wrap" class="wrap">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center">

                    <button type="button" class="btn_primary_lg" id="emailValidation">이메일 인증하기 팝업</button>

        <script type="text/javascript">
            $(function () {
                // Layer : 이메일 인증하기
                $("#emailValidation").click(function (e) {
                    $("html").addClass("layerOpen"); // 20250428 추가
                    $("#wrap").attr("aria-hidden", "true"); // 20250428 추가

                    $("#emailValidationPop").show().focus();
                });
                $("#emailValidationPop .layer_close").click(function (e) {
                    $("#emailValidation").focus(); // 접근성
                });
            });
        </script>
