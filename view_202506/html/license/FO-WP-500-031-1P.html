<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>기본증명서 안내 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="basicguide">기본증명서 안내</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- [include] 기본증명서 안내  -->
        <div data-include-file="/view_202506/html/license/include/500-031-1P.html" class="includeJs"></div>
        <!--// [include] 기본증명서 안내  -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 기본증명서 안내
                $("#basicguide").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#basicguidePop").show().focus();
                });
                $("#basicguidePop .layer_close").click(function (e) {
                    $("#basicguide").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
