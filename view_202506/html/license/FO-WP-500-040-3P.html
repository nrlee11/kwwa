<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="/resources/css/jquery-ui.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>재발급 신청내역 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center">
                <div>
                    <button type="button" class="btn_primary_lg" id="applicationform1">재발급 신청내역</button>
                </div>
            </div>
        </div>
        <!--// wrap(e) -->

        <!-- Layer : 재발급 신청내역 -->
        <div class="layerFix fullPopup" id="applicationformPop1" role="dialog" aria-modal="true" style="display: none" tabindex="0">
            <div class="layer_wrap">
                <div class="head">
                    <strong class="tit">상하수도 국가전문자격시스템</strong>
                </div>
                <div class="cont">
                    <div class="tit_area">
                        <strong class="tit">재발급 신청내역</strong>
                    </div>
                    <div class="article">
                        <div class="ly_half_form size113">
                            <div class="lside">
                                <!-- 등록된 사진 있는 경우 -->
                                <div class="article">
                                    <div class="preview_file_set">
                                        <div class="img_preview">
                                            <img src="/resources/images/temp/img.png" alt="증명사진" />
                                        </div>
                                    </div>
                                </div>
                                <!--// 등록된 사진 있는 경우 -->
                                <!-- 등록된 사진 없는 경우 -->
                                <!-- <div class="article">
                                        <div class="preview_file_set">
                                            <div class="img_preview">
                                                <div class="msg">등록한<br />사진<br />미리보기</div>
                                            </div>
                                        </div>
                                    </div> -->
                                <!--// 등록된 사진 없는 경우 -->
                            </div>
                            <div class="rside">
                                <!-- board -->
                                <div class="board_area">
                                    <!-- board_view -->
                                    <table class="tbl react row sm size120">
                                        <caption>
                                            신청번호, 자격번호, 자격 취득일, 교부 연월일, 재발급 신청일, 재발급 신청사유, 재발급 신청사유 정보 제공
                                        </caption>
                                        <colgroup>
                                            <col style="width: 15.3rem" />
                                            <col />
                                        </colgroup>
                                        <tbody>
                                            <tr>
                                                <th scope="row">신청번호</th>
                                                <td data-cell-header="신청번호"><div>REQ2-25-0001</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">자격번호</th>
                                                <td data-cell-header="자격번호"><div>WL000000</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">자격 취득일</th>
                                                <td data-cell-header="자격 취득일"><div>2025-02-10</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">교부 연월일</th>
                                                <td data-cell-header="교부 연월일"><div>2025-02-10</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">재발급 신청일</th>
                                                <td data-cell-header="재발급 신청일"><div>2025-02-10</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">재발급 신청사유</th>
                                                <td data-cell-header="재발급 신청사유"><div>분실</div></td>
                                            </tr>
                                            <tr>
                                                <th scope="row">배송지 주소</th>
                                                <td data-cell-header="배송지 주소">
                                                    <div>
                                                        07379<br />
                                                        서울특별시 영등포구 대림로-244(대림동)
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <!--// board_view -->
                                </div>
                                <!--// board -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="foot">
                    <div class="btn_area">
                        <button type="button" class="btn_primary_md layer_close">확인</button>
                    </div>
                </div>
                <button class="btn_close layer_close"><span class="hidden">닫기</span></button>
            </div>
        </div>
        <!--// Layer : 재발급 신청내역 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
        <script type="text/javascript">
            $(function () {
                // Layer : 재발급 신청내역
                $("#applicationform1").click(function (e) {
                    $("html").addClass("layerOpen");
                    $("#wrap").attr("aria-hidden", "true");

                    $("#applicationformPop1").show().focus();
                });
                $("#applicationformPop1 .layer_close").click(function (e) {
                    $("#applicationform1").focus(); // 접근성
                });
            });
        </script>
    </body>
</html>
