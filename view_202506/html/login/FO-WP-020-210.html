<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />
        <link rel="icon" type="image/x-icon" href="/resources/images/favicon/favicon.ico" />
        <title>아이디 찾기 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- page_title -->
                        <div class="page_title center">
                            <h2 class="tit">아이디 찾기</h2>
                        </div>
                        <!--// page_title -->

                        <!-- find_account_wrap(s) -->
                        <div class="find_account_wrap">
                            <!-- section(s) -->
                            <div class="section">
                                <div class="tit_area">
                                    <h3 class="tit ico">본인인증으로 찾기</h3>
                                </div>

                                <!-- [include] 본인인증 -->
                                <div data-include-file="/view_202506/html/include/components/identity.html" class="includeJs"></div>
                                <!--// [include] 본인인증 -->
                            </div>
                            <!--// section(e) -->

                            <!-- section(s) -->
                            <div class="section">
                                <div class="tit_area">
                                    <h3 class="tit ico">등록된 회원정보로 찾기</h3>
                                    <p class="desc">회원정보에 등록한 휴대전화 번호와 입력한 번호가 동일해야 인증번호를 받을 수 있습니다.</p>
                                </div>

                                <!-- form-->
                                <div class="fix_cont">
                                    <div class="form_section">
                                        <!-- write -->
                                        <div class="form_list col">
                                            <div class="form_group">
                                                <div class="tit">
                                                    <label for="userName">이름</label>
                                                </div>
                                                <div class="item">
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="inp">
                                                                <!-- (공통)접근성 : id값 변경 시 label for값도 동일하게 변경 -->
                                                                <input type="text" value="" id="userName" placeholder="이름을 입력하세요" autocomplete="off" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="form_group">
                                                <div class="tit">
                                                    <label for="cellPhone">휴대폰번호</label>
                                                </div>
                                                <div class="item">
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="inp">
                                                                <input type="tel" value="" id="cellPhone" placeholder="휴대폰번호 (숫자만 입력)" autocomplete="off" />
                                                            </div>
                                                        </div>
                                                        <p class="msg_txt">'-'생략, 11자리 숫자만 입력해 주세요.</p>
                                                        <!-- 에러 : error -->
                                                        <p class="msg_error">등록된 회원정보가 아닙니다.</p>
                                                        <p class="msg_error">잘못된 형식의 전화번호입니다.</p>
                                                        <!--// 에러 : error -->
                                                    </div>
                                                    <div class="cell full">
                                                        <button type="button" class="btn_secondary_lg">인증번호 받기</button>
                                                    </div>
                                                    <!-- 인증요청 후 재전송으로 버튼 명 변경 -->
                                                    <div class="cell full">
                                                        <button type="button" class="btn_secondary_lg">재전송</button>
                                                    </div>
                                                    <!--// 인증요청 후 재전송으로 버튼 명 변경 -->
                                                    <div class="cell">
                                                        <div class="form_item">
                                                            <div class="request_set">
                                                                <!-- 에러 : error class추가 -->
                                                                <div class="inp error">
                                                                    <input type="tel" value="" maxlength="6" placeholder="인증번호 6자리" autocomplete="off" />
                                                                    <div class="request">
                                                                        <time class="time" datetime="03:00">03:00</time>
                                                                    </div>
                                                                </div>
                                                                <button type="button" class="btn_primary_lg">확인</button>
                                                            </div>
                                                        </div>
                                                        <!-- 에러 : error -->
                                                        <p class="msg_error">인증번호를 확인 후 다시 입력해 주세요.</p>
                                                        <p class="msg_error">인증 시간이 초과되었습니다.</p>
                                                        <!--// 에러 : error -->
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--// write -->
                                    </div>

                                    <!-- btn -->
                                    <div class="bottom_btn_area">
                                        <button type="button" class="btn_primary_lg" disabled>조회하기</button>
                                    </div>
                                    <!--// btn -->
                                </div>
                                <!--// form -->
                            </div>
                            <!--// section(e) -->
                        </div>
                        <!--// find_account_wrap(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/footer.html" class="includeJs"></div>
            <!--// [include] footer(e) : 확인용 -->
        </div>
        <!--// wrap(e) -->

        <!-- [include] side(s) : 확인용 -->
        <div data-include-file="/view_202506/html/include/side.html" class="includeJs"></div>
        <!--// [include] side(e) : 확인용 -->

        <script src="/resources/js/jquery-2.2.4.min.js"></script>
        <script src="/view_202506/resources/js/ui.js"></script>
    </body>
</html>
