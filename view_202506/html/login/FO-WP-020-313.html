<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />

        <meta property="og:description" content="" />

        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="/view_202506/resources/css/common.css" />

        <title>비밀번호 설정 | 한국상하수도협회</title>
    </head>
    <body>
        <!-- wrap(s) -->
        <div id="wrap" class="wrap">
            <!-- [include] header(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/header.html" class="includeJs"></div>
            <!--// [include] header(e) : 확인용 -->

            <!-- container(s) -->
            <div id="container" class="container">
                <div class="lyinner">
                    <!-- contents(s) -->
                    <div id="contents" class="contents">
                        <!-- page_title -->
                        <div class="page_title center">
                            <h2 class="tit">비밀번호 설정</h2>
                        </div>
                        <!--// page_title -->

                        <!-- find_account_wrap(s) -->
                        <div class="find_account_wrap fix_cont">
                            <!-- section(s) -->
                            <div class="section">
                                <p class="find_msg">사용하실 비밀번호를 입력해 주세요.</p>

                                <div class="notice_box center">
                                    <p class="tit"><span class="ico_marknavy" aria-hidden="true"></span>아이디</p>
                                    <p class="txt">abcd12@gmail.com (홍*동)</p>
                                </div>
                            </div>
                            <!--// section(e) -->

                            <!-- section(s) -->
                            <div class="section">
                                <!-- form -->
                                <div class="form_section">
                                    <!-- write -->
                                    <div class="form_list col">
                                        <div class="form_group">
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <div class="inp">
                                                            <!-- 2025-04-23 type변경 -->
                                                            <input type="password" value="" id="" placeholder="새 비밀번호" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form_group">
                                            <div class="item">
                                                <div class="cell">
                                                    <div class="form_item">
                                                        <!-- 에러 : error class추가 -->
                                                        <div class="inp error">
                                                            <!-- 2025-04-23 type변경 -->
                                                            <input type="password" value="" id="" placeholder="새 비밀번호 확인" />
                                                        </div>
                                                    </div>
                                                    <p class="msg_txt">비밀번호는 8자 이상, 16자 이하의 영문자, 숫자 및 특수문자를 조합하여 사용해야 합니다.</p>
                                                    <!-- 에러 : error -->
                                                    <p class="msg_error">비밀번호 조건에 맞지 않습니다. 다시 입력해 주세요.</p>
                                                    <!--// 에러 : error -->
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!--// write -->
                                </div>
                                <!--// form -->

                                <!-- btn -->
                                <div class="bottom_btn_area">
                                    <button type="button" class="btn_primary_lg">설정하기</button>
                                </div>
                                <!--// btn -->
                            </div>
                            <!--// section(e) -->
                        </div>
                        <!--// find_account_wrap(e) -->
                    </div>
                    <!--// contents(e) -->
                </div>
            </div>
            <!--// container(e) -->

            <!-- [include] footer(s) : 확인용 -->
            <div data-include-file="/view_202506/html/include/footer.html" class="includeJs"></div>

        </div>

        <div data-include-file="/view_202506/html/include/side.html" class="includeJs"></div>
