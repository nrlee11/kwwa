<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:title" content="한국상하수도협회" />
        <meta property="og:description" content="" />
        <meta property="og:image" content="" />
        <meta name="format-detection" content="telephone=no" />
        <link rel="stylesheet" type="text/css" href="resources/css/common.css" />
        <link rel="stylesheet" type="text/css" href="resources/css/swiper-bundle.min.css" />
        <link rel="icon" type="image/x-icon" href="resources/images/favicon/favicon.ico" />
        <title>한국상하수도협회 인트로 페이지</title>
        <style>
            body {
                background: none;
            }
            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: url(resources/images/temp/intro_background.png) no-repeat center center;
                background-size: cover;
                z-index: -1;
            }
            .content_wrapper {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                padding: 0;
            }
            .container {
                width: 100%;
                max-width: 980px;
                /* min-height: 100vh; */
                /* display: flex;
                            flex-direction: column;
                            align-items: center; */
                text-align: center;
                padding: 11rem 0;

                box-sizing: border-box;
            }
            @media screen and (max-width: 1200px) {
                .container {
                    padding: 50px 16px;
                }
            }

            h1 {
                font-size: 5rem;
                font-weight: 800;
                color: var(--color-navy);
            }
            @media screen and (max-width: 1200px) {
                h1 {
                    font-size: 3rem;
                }
            }
            p.subtitle {
                font-size: 2rem;
                margin-top: 3.6rem;
                color: #333;
            }

            .card {
                width: 100%;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                gap: 4.8rem;
                background-color: var(--color-navy);
                border-radius: 15px;
                margin: 40px 0;
                padding: 25px;
                color: var(--color-white);
                text-align: left;
            }

            .card h2 {
                margin-bottom: 10px;
                font-size: 4rem;
            }

            .card p {
                font-size: 1.6rem;
                /* margin-bottom: 20px; */
            }
            .title_group {
                width: 60%;
                display: flex;
                flex-direction: column;
                justify-content: space-between;

            }

            .btn_group {
                width: 100%;
                display: flex;
                justify-content: center;
                flex-direction: column;
                gap: 2.5rem;
            }

            .btn {
                overflow: hidden;
                width: 100%;
                height: 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: white;
                color: var(--color-navy);
                /* padding: 10px 0; */
                padding-left: 20px;
                border-radius: 10px;
                font-weight: 600;
                font-size: 2rem;
                text-decoration: none;
                transition: 0.2s;
            }

            .btn:hover {
                background-color: #e0f0ff;
            }

            .card.edu {
                background-color: var(--color-navy);
            }

            .btn.edu {
                color: var(--color-navy);
            }
            .card.exam {
              background-color: var(--color-navy);
            }

            .btn.exam {
                color: var(--color-navy);
            }
            .btn.edu .arrow_box {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-shrink: 0;
                /* width: 15%; */
                height: 100%;
                background-color: var(--color-warmblue);
                padding: 10px;
                margin-left: 1rem;
            }
            .btn.edu .arrow_box img {
                width: 3rem;
                height: 3rem;
            }
            .btn.exam .arrow_box {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-shrink: 0;
                /* width: 15%; */
                height: 100%;
                background-color: var(--color-warmblue);
                padding: 10px;
                margin-left: 1rem;
            }
            .btn.exam .arrow_box img {
                width: 3rem;
                height: 3rem;
            }

            .footer {
                margin-top: 60px;
                font-size: 0.9rem;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 30px;
                color: #333;
            }

            .footer .energyenvironment_logo {
                width: 21rem;
                height: 4.7rem;
                background: url(resources/images/common/energyenvironment_logo.svg) no-repeat 0 0;
                background-size: contain;
            }
            .footer .kwwa_logo {
                width: 21rem;
                height: 3.3rem;
                background: url(resources/images/common/kwwa_logo.svg) no-repeat 0 0;
            }

            .btn.exam:nth-child(2) {
                visibility: hidden;
            }
            @media screen and (max-width: 1200px) {
                .card {
                    display: flex;
                    flex-direction: column;
                    gap: 2rem;
                }
                .card h2 {
                    margin-bottom: 10px;
                    font-size: 3rem;
                }

                .card p {
                    font-size: 2rem;
                    /* margin-bottom: 20px; */
                }
                .title_group {
                    width: 100%;
                    display: flex;
                    flex-direction: column;
                    gap: 2rem;
                }
                .btn {
                    font-size: 1.6rem;
                }
                .btn_group {
                    justify-content: flex-start;
                }
                .btn.edu .arrow_box img {
                width: 2rem;
                height: 2rem;
                }
                .btn.exam .arrow_box img {
                width: 2rem;
                height: 2rem;
                }
            }
              @media screen and (max-width: 767px) {
                .card p {
                    font-size: 1.6rem;
                }
                .footer {
                    display: flex;
                    flex-direction: column;
                }
            }

        </style>
    </head>
    <body>
        <div class="content_wrapper">
            <div class="container">
                <h1>상하수도 국가전문자격</h1>
                <p class="subtitle">각 자격 별 홈페이지는 링크를 통해 이동할 수 있습니다.</p>
                <div class="card edu">
                    <div class="title_group">
                        <h2>양성과정</h2>
                        <p>교육과정 수료 후 평가시험 합격시 자격을 취득 </p>
                    </div>
                    <div class="btn_group">
                        <a href="main.html" class="btn edu">
                            상수도관망시설운영관리사 1급 · 2급
                            <span class="arrow_box">
                                <img src="resources/images/common/bg_arrow-right.svg" alt="" />
                            </span>
                        </a>
                        <a href="main.html" class="btn edu">
                            정수시설운영관리사 3급
                            <span class="arrow_box">
                                <img src="resources/images/common/bg_arrow-right.svg" alt="" />
                            </span>
                        </a>
                    </div>
                </div>
                <div class="card exam">
                    <div class="title_group">
                        <h2>검정시험</h2>
                        <p>검정평가시험 합격 시 자격을 취득</p>
                    </div>
                    <div class="btn_group">
                        <a href="main.html" class="btn exam">
                            정수시설운영관리사 1급 · 2급  · 3급
                            <span class="arrow_box">
                                <img src="resources/images/common/bg_arrow-right.svg" alt="" />
                            </span>
                        </a>
                    </div>
                </div>
                <div class="footer">
                    <div class="energyenvironment_logo">
                        <span class="hidden">기후에너지환경부</span>
                    </div>
                    <div class="kwwa_logo">
                        <span class="hidden">한국상하수도협회</span>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
